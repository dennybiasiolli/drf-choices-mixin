site_name: drf-choices-mixin
site_url: https://dennybiasiolli.github.io/drf-choices-mixin/
repo_url: https://github.com/dennybiasiolli/drf-choices-mixin
repo_name: dennybiasiolli/drf-choices-mixin
site_description: >-
  A Django REST Framework mixin that auto-generates API endpoints
  for model field choices.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.footer
    - navigation.sections

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - API Reference: api-reference.md